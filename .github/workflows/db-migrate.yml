name: db-migrate

# Auto-applies any new SQL files under supabase/migrations/ to the
# linked Supabase project on every push to main. Skips entirely if the
# push didn't touch a migration file.
#
# Requires three repo secrets (Settings → Secrets and variables → Actions):
#
#   SUPABASE_ACCESS_TOKEN  Personal access token from
#                          https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF   Your project ref (sihglhycaqwgjxiyaati for this one)
#   SUPABASE_DB_PASSWORD   The DB password, from Supabase → Settings →
#                          Database. supabase db push needs this for
#                          the direct connection.
#
# Without those secrets the job fails fast with a clear message — leave
# them unset until you're ready to flip on automation.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$PROJECT_REF" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Missing one of SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF / SUPABASE_DB_PASSWORD repo secrets."
            exit 1
          fi
          supabase link --project-ref "$PROJECT_REF"
          supabase db push
